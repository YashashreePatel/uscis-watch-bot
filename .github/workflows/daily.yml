name: Daily USCIS WatchBot

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore updates database cache
        id: restore-db
        uses: actions/cache/restore@v4
        with:
          path: updates.db
          key: updates-db-${{ github.run_id }}
          restore-keys: |
            updates-db-

      - name: Show files before running
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m app.daily

      - name: Show files after running
        if: always()
        run: |
          ls -la
          find . -maxdepth 3 -name "*.db" -type f

      - name: Save updates database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: updates.db
          key: updates-db-${{ github.run_id }}-${{ github.run_attempt }}